

services:
  db:
    image: postgres:16
    container_name: url_shortener_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-url_shortener}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ${ECR_REGISTRY}/url-shortener:latest
    container_name: url_shortener_app
    restart: always
    ports:
      - "80:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-url_shortener}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
