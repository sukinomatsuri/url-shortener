name: Deploy URL Shortener

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: url-shortener

jobs:
  test:
    name: Test Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt pytest httpx

      - name: Run tests
        run: pytest tests/ -v

  build-and-push:
    name: Build & Push to Amazon ECR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            
            # Setup working directory
            mkdir -p ~/url-shortener
            
            # Pull new image and restart services
            cd ~/url-shortener
            
            # Create/Update docker-compose.prod.yml on server
            cat << 'EOF' > docker-compose.prod.yml
            ${{ env.DOCKER_COMPOSE_PROD_CONTENT }}
            EOF
            
            # Export env vars needed for docker-compose
            export POSTGRES_USER=postgres
            export POSTGRES_PASSWORD=url_shortener_secret_db_password
            export POSTGRES_DB=url_shortener
            export ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
            
            # Pull latest image
            docker-compose -f docker-compose.prod.yml pull
            
            # Up containers in detached mode
            docker-compose -f docker-compose.prod.yml up -d
        env:
          DOCKER_COMPOSE_PROD_CONTENT: |
            version: "3.9"
            
            services:
              db:
                image: postgres:16
                container_name: url_shortener_db
                restart: always
                environment:
                  POSTGRES_USER: $${POSTGRES_USER:-postgres}
                  POSTGRES_PASSWORD: $${POSTGRES_PASSWORD}
                  POSTGRES_DB: $${POSTGRES_DB:-url_shortener}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U postgres"]
                  interval: 5s
                  timeout: 5s
                  retries: 5
            
              app:
                image: $${ECR_REGISTRY}/url-shortener:latest
                container_name: url_shortener_app
                restart: always
                ports:
                  - "80:8000"
                environment:
                  DATABASE_URL: postgresql://$${POSTGRES_USER:-postgres}:$${POSTGRES_PASSWORD}@db:5432/$${POSTGRES_DB:-url_shortener}
                depends_on:
                  db:
                    condition: service_healthy
            
            volumes:
              postgres_data:
