name: Deploy URL Shortener

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: url-shortener

jobs:
  test:
    name: Test Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt pytest httpx

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./test.db
        run: pytest tests/ -v

  build-and-push:
    name: Build & Push to Amazon ECR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY
          script: |
            # Login to ECR
            aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin $ECR_REGISTRY

            # Setup working directory
            mkdir -p ~/url-shortener
            cd ~/url-shortener

            # Create docker-compose.prod.yml on server
            cat > docker-compose.prod.yml << 'COMPOSE_EOF'
            services:
              db:
                image: postgres:16
                container_name: url_shortener_db
                restart: always
                environment:
                  POSTGRES_USER: postgres
                  POSTGRES_PASSWORD: url_shortener_secret_db_password
                  POSTGRES_DB: url_shortener
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U postgres"]
                  interval: 5s
                  timeout: 5s
                  retries: 5

              app:
                image: ${ECR_REGISTRY}/url-shortener:latest
                container_name: url_shortener_app
                restart: always
                ports:
                  - "80:8000"
                environment:
                  DATABASE_URL: postgresql://postgres:url_shortener_secret_db_password@db:5432/url_shortener
                depends_on:
                  db:
                    condition: service_healthy

            volumes:
              postgres_data:
            COMPOSE_EOF

            # Export ECR_REGISTRY for docker compose variable substitution
            export ECR_REGISTRY=$ECR_REGISTRY

            # Pull latest image and start
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
