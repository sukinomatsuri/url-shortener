<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <title>URL Shortener</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #8b5cf6;
            --secondary: #3b82f6;
            --text: #f8fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.2), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.2), transparent 40%);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2.5rem 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            transform: translateY(0);
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            margin-top: 0;
        }

        p {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .input-group {
            position: relative;
            margin-bottom: 1rem;
        }

        input {
            width: 100%;
            padding: 1rem 1.5rem;
            padding-right: 120px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        input::placeholder {
            color: #64748b;
        }

        button {
            position: absolute;
            right: 6px;
            top: 6px;
            bottom: 6px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 1.5rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.1s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.95);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Result Section */
        .result-box {
            display: none;
            margin-top: 1.5rem;
            padding: 1.25rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed var(--primary);
            border-radius: 16px;
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a78bfa;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .short-url {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 0.75rem 0.75rem 0.75rem 1rem;
            margin-bottom: 0px;
        }

        .short-url a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
            word-break: break-all;
            margin-right: 15px;
            text-align: left;
            transition: color 0.2s;
        }

        .short-url a:hover {
            color: #93c5fd;
            text-decoration: underline;
        }

        .copy-btn {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1rem;
            top: 0;
            right: 0;
            bottom: 0;
            margin: 0;
            flex-shrink: 0;
        }
        
        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .error-msg {
            display: none;
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            animation: slideDown 0.3s ease;
        }

        /* Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
        }
        .blob-1 {
            width: 300px;
            height: 300px;
            background: rgba(139, 92, 246, 0.3);
            top: -100px;
            left: -100px;
        }
        .blob-2 {
            width: 350px;
            height: 350px;
            background: rgba(59, 130, 246, 0.25);
            bottom: -150px;
            right: -100px;
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <h1>MiniLink</h1>
        <p>Shorten your long links in a split second.</p>

        <div class="input-group">
            <input type="url" id="urlInput" placeholder="https://very-long-url.com/something..." required autocomplete="off">
            <button id="shortenBtn">Shorten</button>
        </div>
        <div class="error-msg" id="errorMsg">Please enter a valid URL.</div>

        <div class="result-box" id="resultBox">
            <div class="result-title">Your Shortened Link</div>
            <div class="short-url">
                <a href="#" id="shortLink" target="_blank">http://localhost:8000/xyz</a>
                <button class="copy-btn" id="copyBtn">Copy</button>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const shortenBtn = document.getElementById('shortenBtn');
        const resultBox = document.getElementById('resultBox');
        const shortLink = document.getElementById('shortLink');
        const copyBtn = document.getElementById('copyBtn');
        const errorMsg = document.getElementById('errorMsg');

        shortenBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            
            // Basic URL validation
            try {
                new URL(url);
                errorMsg.style.display = 'none';
            } catch (_) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = "Please enter a valid URL (starting with http:// or https://)";
                resultBox.style.display = 'none';
                return;
            }

            // UI Loading state
            shortenBtn.innerText = 'Wait...';
            shortenBtn.disabled = true;

            try {
                const response = await fetch('/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                if (!response.ok) {
                    throw new Error('Failed to shorten url.');
                }

                const data = await response.json();
                
                // Show result
                const fullShortUrl = data.short_url;
                shortLink.href = fullShortUrl;
                shortLink.innerText = fullShortUrl;
                
                resultBox.style.display = 'block';
                copyBtn.innerText = 'Copy';
                
            } catch (error) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = "Something went wrong on the server.";
                resultBox.style.display = 'none';
            } finally {
                shortenBtn.innerText = 'Shorten';
                shortenBtn.disabled = false;
            }
        });

        // Copy functionality
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(shortLink.href).then(() => {
                copyBtn.innerText = 'Copied!';
                setTimeout(() => { copyBtn.innerText = 'Copy'; }, 2000);
            });
        });

        // Enter key to submit
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                shortenBtn.click();
            }
        });
    </script>
</body>
</html>
